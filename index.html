<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#060912" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="M8" />
  <title>M8 — Personal AI Agent</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon-v2.png" />
  <link rel="icon" type="image/png" href="/icons/icon-192-v2.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- boot splash (powers up, then fades to the app) -->
  <div id="boot" class="boot" aria-hidden="true">
    <div class="boot-orb"></div>
    <div class="boot-name">M8</div>
    <div class="boot-line">// INITIALIZING</div>
  </div>

  <!-- sci-fi backdrop: neural net + HUD frame + scanline -->
  <div class="fx" aria-hidden="true">
    <svg class="fx__net" viewBox="0 0 390 845" preserveAspectRatio="xMidYMid slice">
      <g stroke="rgba(45,226,230,.20)" stroke-width=".6" fill="none"><line x1="150" y1="731" x2="157" y2="676"/><line x1="150" y1="731" x2="193" y2="753"/><line x1="150" y1="731" x2="226" y2="774"/><line x1="150" y1="731" x2="129" y2="648"/><line x1="25" y1="311" x2="38" y2="373"/><line x1="25" y1="311" x2="16" y2="287"/><line x1="25" y1="311" x2="33" y2="281"/><line x1="22" y1="800" x2="76" y2="838"/><line x1="329" y1="380" x2="338" y2="361"/><line x1="329" y1="380" x2="296" y2="431"/><line x1="329" y1="380" x2="315" y2="364"/><line x1="329" y1="380" x2="359" y2="388"/><line x1="329" y1="380" x2="257" y2="362"/><line x1="174" y1="98" x2="174" y2="121"/><line x1="174" y1="98" x2="221" y2="72"/><line x1="174" y1="98" x2="236" y2="101"/><line x1="174" y1="98" x2="128" y2="63"/><line x1="174" y1="98" x2="126" y2="156"/><line x1="157" y1="676" x2="231" y2="687"/><line x1="157" y1="676" x2="193" y2="753"/></g>
      <g fill="#a9e0ff"><circle class="nd" cx="150" cy="731" r="1.9"/><circle class="nd" cx="25" cy="311" r="1.9"/><circle class="nd" cx="22" cy="800" r="2.2"/><circle class="nd" cx="329" cy="380" r="2.4"/><circle class="nd" cx="174" cy="98" r="2.3"/><circle class="nd" cx="157" cy="676" r="1.2"/><circle class="nd" cx="333" cy="26" r="2"/><circle class="nd" cx="219" cy="151" r="1.5"/><circle class="nd" cx="151" cy="29" r="2.4"/><circle class="nd" cx="15" cy="406" r="2"/><circle class="nd" cx="297" cy="253" r="0.8"/><circle class="nd" cx="68" cy="78" r="0.7"/><circle class="nd" cx="319" cy="132" r="1.6"/><circle class="nd" cx="358" cy="738" r="1.9"/><circle class="nd" cx="52" cy="60" r="1.7"/><circle class="nd" cx="368" cy="604" r="1.7"/><circle class="nd" cx="319" cy="128" r="1"/><circle class="nd" cx="336" cy="595" r="2.3"/><circle class="nd" cx="231" cy="687" r="1.9"/><circle class="nd" cx="75" cy="561" r="1.2"/><circle class="nd" cx="279" cy="20" r="1.5"/><circle class="nd" cx="53" cy="75" r="0.9"/><circle class="nd" cx="316" cy="239" r="0.6"/><circle class="nd" cx="314" cy="483" r="1.8"/><circle class="nd" cx="305" cy="784" r="0.9"/><circle class="nd" cx="38" cy="373" r="0.8"/><circle class="nd" cx="338" cy="361" r="1.2"/><circle class="nd" cx="151" cy="167" r="1.2"/><circle class="nd" cx="193" cy="753" r="1.7"/><circle class="nd" cx="80" cy="478" r="1.1"/><circle class="nd" cx="145" cy="544" r="1.5"/><circle class="nd" cx="83" cy="179" r="2.2"/><circle class="nd" cx="76" cy="838" r="2.5"/><circle class="nd" cx="174" cy="121" r="1.4"/><circle class="nd" cx="211" cy="18" r="1.7"/><circle class="nd" cx="221" cy="72" r="2.1"/><circle class="nd" cx="296" cy="431" r="1.3"/><circle class="nd" cx="227" cy="258" r="1.1"/><circle class="nd" cx="16" cy="287" r="2.2"/><circle class="nd" cx="58" cy="530" r="1"/><circle class="nd" cx="218" cy="524" r="2"/><circle class="nd" cx="291" cy="377" r="2.4"/><circle class="nd" cx="69" cy="496" r="2"/><circle class="nd" cx="113" cy="755" r="1.4"/><circle class="nd" cx="54" cy="367" r="1.1"/><circle class="nd" cx="335" cy="708" r="0.9"/><circle class="nd" cx="293" cy="776" r="2.2"/><circle class="nd" cx="315" cy="364" r="0.7"/><circle class="nd" cx="343" cy="658" r="1.3"/><circle class="nd" cx="98" cy="152" r="2.3"/><circle class="nd" cx="20" cy="45" r="1.3"/><circle class="nd" cx="306" cy="742" r="1.6"/><circle class="nd" cx="279" cy="661" r="1.7"/><circle class="nd" cx="250" cy="340" r="1.5"/><circle class="nd" cx="23" cy="408" r="1.8"/><circle class="nd" cx="359" cy="388" r="2.2"/><circle class="nd" cx="365" cy="136" r="1.5"/><circle class="nd" cx="249" cy="322" r="1.9"/><circle class="nd" cx="145" cy="625" r="1"/><circle class="nd" cx="253" cy="724" r="1.9"/><circle class="nd" cx="226" cy="774" r="1.4"/><circle class="nd" cx="329" cy="211" r="2.2"/><circle class="nd" cx="33" cy="281" r="1.6"/><circle class="nd" cx="297" cy="128" r="0.7"/><circle class="nd" cx="236" cy="101" r="1.6"/><circle class="nd" cx="129" cy="648" r="2.4"/><circle class="nd" cx="174" cy="804" r="1.2"/><circle class="nd" cx="185" cy="250" r="0.6"/><circle class="nd" cx="147" cy="334" r="1.9"/><circle class="nd" cx="257" cy="362" r="0.9"/><circle class="nd" cx="128" cy="63" r="2.4"/><circle class="nd" cx="348" cy="57" r="1.5"/><circle class="nd" cx="35" cy="164" r="1.1"/><circle class="nd" cx="292" cy="723" r="0.8"/><circle class="nd" cx="126" cy="156" r="0.6"/><circle class="nd" cx="172" cy="34" r="1.1"/><circle class="nd" cx="74" cy="40" r="2.4"/><circle class="nd" cx="98" cy="180" r="2.3"/></g>
    </svg>
    <div class="fx__scan"></div>
    <span class="fx__hud tl"></span><span class="fx__hud tr"></span><span class="fx__hud bl"></span><span class="fx__hud br"></span>
  </div>

  <!-- ── HEADER ────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <div id="m8-orb" class="orb idle"></div>
      <div>
        <span class="m8-name">M8</span>
        <span id="status-text" class="m8-status">جاهز</span>
      </div>
    </div>
    <div class="header-right">
      <button id="stop-btn" class="btn-icon" title="Stop speaking" aria-label="Stop speaking">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <rect x="6.6" y="6" width="3.6" height="12" rx="1.4"/>
          <rect x="13.8" y="6" width="3.6" height="12" rx="1.4"/>
        </svg>
      </button>
      <div class="menu-wrap">
        <button id="menu-btn" class="btn-set" aria-label="Menu" title="Menu" aria-haspopup="true" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="19" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </button>
        <div id="launcher" class="launcher" hidden>
          <button id="tasks-btn" class="launcher-item" aria-label="Tasks">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 6h9"/><path d="M4 12h9"/><path d="M4 18h6"/>
              <path d="M16.5 5.6l1.6 1.6 3.4-3.4"/>
            </svg>
            <span>Tasks</span>
          </button>
          <button id="money-btn" class="launcher-item" aria-label="Money">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H18a2 2 0 0 1 2 2v1"/>
              <path d="M3 7.5V17a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3"/>
              <path d="M21 11h-4a2 2 0 0 0 0 4h4a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1z"/>
            </svg>
            <span>Money</span>
          </button>
          <button id="settings-btn" class="launcher-item" aria-label="Diagnostics">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2.2 L20.5 7 V17 L12 21.8 L3.5 17 V7 Z"/>
              <circle cx="12" cy="12" r="2.1" fill="currentColor" stroke="none"/>
              <circle cx="12" cy="6.6" r="1"/><circle cx="16.8" cy="14.6" r="1"/><circle cx="7.2" cy="14.6" r="1"/>
              <line x1="12" y1="12" x2="12" y2="6.6"/><line x1="12" y1="12" x2="16.8" y2="14.6"/><line x1="12" y1="12" x2="7.2" y2="14.6"/>
            </svg>
            <span>Diagnostics</span>
          </button>
        </div>
      </div>
      <button id="lang-toggle" class="btn-lang">EN</button>
    </div>
  </header>

  <!-- ── CHAT AREA ──────────────────────────── -->
  <div class="chat-wrap">
    <div id="messages" class="messages"></div>
  </div>

  <!-- ── INPUT BAR ──────────────────────────── -->
  <div id="attachment-chips" class="attachment-chips"></div>
  <!-- Reply-to-message bar (hidden by default, shown when user taps Reply on a message) -->
  <div id="reply-bar" class="reply-bar reply-bar--hidden">
    <div class="reply-bar__quote" id="reply-quote"></div>
    <button class="reply-bar__close" id="reply-cancel" title="Cancel reply">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <footer class="input-bar">
    <textarea
      id="text-input"
      class="text-input"
      rows="1"
      placeholder="اكتب رسالة أو اضغط على المايك..."
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    ></textarea>

    <!-- Build-33b: attach a text/CSV/JSON file (click → picker; also drag-drop / paste) -->
    <input id="file-input" type="file" multiple hidden
           accept=".txt,.csv,.tsv,.json,.md,.markdown,.log,.yaml,.yml,text/*,application/json,image/png,image/jpeg,image/webp,image/gif,.pdf,.epub,.docx,.doc,application/pdf,application/epub+zip,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword" />
    <button id="attach-btn" class="btn-attach" title="Attach a file or image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
      </svg>
    </button>

    <button id="mic-btn" class="btn-mic" title="Voice input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8"  y1="23" x2="16" y2="23"/>
      </svg>
    </button>

    <button id="send-btn" class="btn-send" title="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </footer>

  <!-- Diagnostics slide-in tab (opens from the settings glyph) -->
  <div id="diag-panel" class="diag-panel" aria-hidden="true">
    <div class="diag-head">
      <button id="diag-back" class="diag-back" aria-label="Back to chat">&#8249;</button>
      <span class="diag-title">DIAGNOSTICS</span>
    </div>
    <div class="diag-body">
      <div class="diag-row"><span>Knowledge nodes</span><b id="diag-nodes">&mdash;</b></div>
      <div class="diag-row"><span>Graph status</span><b id="diag-graph" class="ok">&mdash;</b></div>
      <div class="diag-row"><span>Extractor</span><b>Groq &middot; free</b></div>
      <div class="diag-row"><span>Embeddings</span><b>Gemini</b></div>
      <div class="diag-row"><span>Uplink</span><b id="diag-up" class="ok">&mdash;</b></div>
      <div class="diag-row"><span>Build</span><b id="diag-build">&mdash;</b></div>
    </div>
  </div>

  <!-- Tasks slide-in panel -->
  <div id="tasks-panel" class="diag-panel tasks-panel" aria-hidden="true">
    <div class="diag-head">
      <button id="tasks-back" class="diag-back" aria-label="Back to chat">&#8249;</button>
      <span class="diag-title">TASKS</span>
      <button id="tasks-remind" class="tasks-remind" aria-label="Enable task reminders" title="Enable push reminders">&#128276;</button>
    </div>
    <div class="tasks-add">
      <button id="task-cat" class="task-cat-btn" aria-label="New task: work or personal" title="New task category — tap to switch">P</button>
      <input id="task-input" class="task-input" type="text" placeholder="Add a task…" autocomplete="off" />
      <input id="task-due" class="task-due" type="date" aria-label="Due date" />
      <button id="task-add" class="task-add-btn" aria-label="Add task">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <div id="tasks-filter" class="tasks-filter" role="tablist" aria-label="Filter tasks">
      <button data-cat="all" class="active" role="tab">All</button>
      <button data-cat="work" role="tab">Work</button>
      <button data-cat="personal" role="tab">Personal</button>
    </div>
    <div id="tasks-list" class="tasks-list"></div>
  </div>

  <!-- Money slide-in panel (privacy-walled read-only summary of Family Wallet) -->
  <div id="money-panel" class="diag-panel money-panel" aria-hidden="true">
    <div class="diag-head">
      <button id="money-back" class="diag-back" aria-label="Back to chat">&#8249;</button>
      <span class="diag-title">MONEY</span>
      <button id="money-refresh" class="money-refresh" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v4h-4"/>
        </svg>
      </button>
    </div>
    <div id="money-body" class="money-body"></div>
  </div>

  <!-- Install-as-app button (appears only when Chrome says it's installable) -->
  <button id="install-btn" class="install-btn" style="display:none" aria-label="Install M8 as an app">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/>
    </svg>
    <span>Install M8</span>
  </button>

  <!-- ── SCRIPTS ────────────────────────────── -->
  <script src="js/voice.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/money.js"></script>
  <script>
  (function(){
    if('serviceWorker' in navigator){ window.addEventListener('load',function(){ navigator.serviceWorker.register('/sw.js').catch(function(){}); }); }
    var deferredPrompt=null, ibtn=document.getElementById('install-btn');
    var standalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
    window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferredPrompt=e; if(ibtn && !standalone) ibtn.style.display='flex'; });
    if(ibtn) ibtn.addEventListener('click', function(){
      if(!deferredPrompt) return;
      ibtn.style.display='none';
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(){ deferredPrompt=null; });
    });
    window.addEventListener('appinstalled', function(){ if(ibtn) ibtn.style.display='none'; });
    var boot=document.getElementById('boot');
    if(boot){ setTimeout(function(){ boot.classList.add('boot--hide'); setTimeout(function(){ if(boot.parentNode) boot.parentNode.removeChild(boot); }, 700); }, 1300); }
    function buzz(ms){ if(navigator.vibrate){ try { navigator.vibrate(ms); } catch(_){} } }
    ['settings-btn','send-btn','mic-btn','attach-btn'].forEach(function(id){ var el=document.getElementById(id); if(el) el.addEventListener('click',function(){ buzz(12); }); });
    var p=document.getElementById('diag-panel'),o=document.getElementById('settings-btn'),b=document.getElementById('diag-back'),loaded=false;
    function set(id,v){var e=document.getElementById(id);if(e&&v!=null)e.textContent=v;}
    function load(){if(loaded)return;loaded=true;
      fetch('/api/health').then(function(r){return r.json();}).then(function(d){
        set('diag-up', d&&d.ok?'100%':'degraded');
        set('diag-graph', d&&d.supabase&&d.supabase.ok?'synced':'offline');
        if(d&&d.sha) set('diag-build', String(d.sha).slice(0,7));
      }).catch(function(){});
      fetch('/api/knowledge?fn=status').then(function(r){return r.json();}).then(function(d){
        var n=d&&(d.total_all_nodes!=null?d.total_all_nodes:d.total_nodes_in_books);
        if(n!=null) set('diag-nodes', Number(n).toLocaleString());
      }).catch(function(){});
    }
    if(o) o.addEventListener('click',function(){p.classList.add('open');p.setAttribute('aria-hidden','false');load();});
    if(b) b.addEventListener('click',function(){p.classList.remove('open');p.setAttribute('aria-hidden','true');});
  })();
  </script>

</body>
</html>
